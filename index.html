<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Dynamic Music Player</title>
    <script src="https://cdn.jsdelivr.net/npm/music-metadata-browser@2.5.9/dist/music-metadata-browser.min.js"></script>
    <style>
        /* Анимация плавного фона */
        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        body { 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #004e92, #00f2fe);
            background-size: 400% 400%;
            animation: gradientMove 15s ease infinite;
            color: white; 
            font-family: 'Segoe UI', sans-serif; 
        }

        .app-container { 
            display: flex; 
            gap: 30px; 
            background: rgba(0, 0, 0, 0.3); 
            padding: 40px; 
            border-radius: 30px; 
            backdrop-filter: blur(20px); 
            width: 750px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .player-side { width: 300px; text-align: center; }
        
        #coverArt { 
            width: 220px; 
            height: 220px; 
            border-radius: 20px; 
            margin-bottom: 20px; 
            object-fit: cover; 
            border: 4px solid #4facfe;
            box-shadow: 0 0 20px rgba(79, 172, 254, 0.5);
        }
        
        audio { width: 100%; margin-bottom: 20px; }
        
        .upload-btn { 
            background: #4facfe; 
            padding: 12px 25px; 
            border-radius: 50px; 
            cursor: pointer; 
            display: block; 
            font-weight: bold; 
            transition: 0.3s;
        }
        .upload-btn:hover { background: #00f2fe; transform: scale(1.05); }

        .playlist-side { width: 400px; }
        .playlist-list { list-style: none; padding: 0; max-height: 350px; overflow-y: auto; }
        .playlist-item { 
            background: rgba(255, 255, 255, 0.08); 
            margin: 8px 0; 
            padding: 12px; 
            border-radius: 10px; 
            cursor: pointer; 
            transition: 0.2s; 
        }
        .playlist-item:hover { background: rgba(79, 172, 254, 0.3); }
    </style>
</head>
<body>

<div class="app-container">
    <div class="player-side">
        <img id="coverArt" src="https://via.placeholder.com/220?text=Загрузите+музыку" alt="Обложка">
        <audio id="audioPlayer" controls></audio>
        <label class="upload-btn">
            Загрузить музыку
            <input type="file" id="fileInput" accept="audio/*" style="display:none">
        </label>
    </div>

    <div class="playlist-side">
        <h3>Ваш плейлист</h3>
        <ul id="playlist" class="playlist-list"></ul>
    </div>
</div>

<script>
    const audio = document.getElementById('audioPlayer');
    const fileInput = document.getElementById('fileInput');
    const playlistEl = document.getElementById('playlist');
    const coverArt = document.getElementById('coverArt');

    // Загрузка плейлиста из памяти браузера
    let tracks = JSON.parse(localStorage.getItem('myPlaylist')) || [];

    function updatePlaylistUI() {
        playlistEl.innerHTML = '';
        tracks.forEach((track, index) => {
            const li = document.createElement('li');
            li.className = 'playlist-item';
            li.textContent = track.name;
            li.onclick = () => playTrack(index);
            playlistEl.appendChild(li);
        });
    }

    function playTrack(index) {
        const track = tracks[index];
        audio.src = track.url;
        audio.play();
        coverArt.src = track.cover || "https://via.placeholder.com/220?text=Нет+обложки";
    }
fileInput.onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const fileUrl = URL.createObjectURL(file);
        let coverUrl = null;

        // Попытка извлечь обложку
        try {
            const metadata = await musicMetadata.parseBlob(file);
            if (metadata.common.picture && metadata.common.picture.length > 0) {
                const picture = metadata.common.picture[0];
                const blob = new Blob([picture.data], { type: picture.format });
                coverUrl = URL.createObjectURL(blob);
            }
        } catch (err) {
            console.log("Метаданные не найдены, продолжаем.");
        }

        const newTrack = { name: file.name, url: fileUrl, cover: coverUrl };
        tracks.push(newTrack);
        
        // Сохраняем в localStorage (сохраняются ссылки на текущую сессию)
        localStorage.setItem('myPlaylist', JSON.stringify(tracks));
        
        updatePlaylistUI();
        playTrack(tracks.length - 1);
    };

    // Первичная отрисовка
    updatePlaylistUI();
</script>
</body>
</html>
